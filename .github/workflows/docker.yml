name: docker

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .dockerignore
      - .github/workflows/docker.yml
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/phys-ros
  ISAAC_ROS_TAG: isaac_ros_28556f8bc78a98822bd08b2d7c6fcf9b-amd64
  ROS_BASE_TAG: jazzy-ros-base-noble

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ros_base: ${{ steps.plan.outputs.ros_base }}
      ros_dev: ${{ steps.plan.outputs.ros_dev }}
      isaac_base: ${{ steps.plan.outputs.isaac_base }}
      isaac_perception: ${{ steps.plan.outputs.isaac_perception }}
      isaac_manipulation: ${{ steps.plan.outputs.isaac_manipulation }}
      isaac_dev: ${{ steps.plan.outputs.isaac_dev }}
    steps:
      - name: Check Out Repo
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Docker Inputs
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.ref }}
          filters: |
            common:
              - '.dockerignore'
              - '.github/workflows/docker.yml'
            shared_base:
              - 'docker/scripts/**'
            ros_base:
              - 'docker/ros/Dockerfile.base'
            ros_dev:
              - 'docker/ros/Dockerfile.dev'
            isaac_base:
              - 'docker/isaac-ros/Dockerfile.base'
            isaac_perception:
              - 'docker/isaac-ros/Dockerfile.perception'
            isaac_manipulation:
              - 'docker/isaac-ros/Dockerfile.manipulation'
            isaac_dev:
              - 'docker/isaac-ros/Dockerfile.dev'

      - name: Compute Rebuild Plan
        id: plan
        env:
          BUILD_ALL: ${{ github.event_name == 'workflow_dispatch' }}
          COMMON_CHANGED: ${{ steps.filter.outputs.common }}
          SHARED_BASE_CHANGED: ${{ steps.filter.outputs.shared_base }}
          ROS_BASE_CHANGED: ${{ steps.filter.outputs.ros_base }}
          ROS_DEV_CHANGED: ${{ steps.filter.outputs.ros_dev }}
          ISAAC_BASE_CHANGED: ${{ steps.filter.outputs.isaac_base }}
          ISAAC_PERCEPTION_CHANGED: ${{ steps.filter.outputs.isaac_perception }}
          ISAAC_MANIPULATION_CHANGED: ${{ steps.filter.outputs.isaac_manipulation }}
          ISAAC_DEV_CHANGED: ${{ steps.filter.outputs.isaac_dev }}
        run: |
          if [[ "${BUILD_ALL}" == "true" ]]; then
            ros_base=true
            ros_dev=true
            isaac_base=true
            isaac_perception=true
            isaac_manipulation=true
            isaac_dev=true
          else
            ros_base="${ROS_BASE_CHANGED:-false}"
            ros_dev="${ROS_DEV_CHANGED:-false}"
            isaac_base="${ISAAC_BASE_CHANGED:-false}"
            isaac_perception="${ISAAC_PERCEPTION_CHANGED:-false}"
            isaac_manipulation="${ISAAC_MANIPULATION_CHANGED:-false}"
            isaac_dev="${ISAAC_DEV_CHANGED:-false}"

            if [[ "${COMMON_CHANGED:-false}" == "true" ]]; then
              ros_base=true
              ros_dev=true
              isaac_base=true
              isaac_perception=true
              isaac_manipulation=true
              isaac_dev=true
            else
              if [[ "${SHARED_BASE_CHANGED:-false}" == "true" ]]; then
                ros_base=true
                isaac_base=true
              fi
              if [[ "${ros_base}" == "true" ]]; then
                ros_dev=true
              fi
              if [[ "${isaac_base}" == "true" ]]; then
                isaac_perception=true
              fi
              if [[ "${isaac_perception}" == "true" ]]; then
                isaac_manipulation=true
              fi
              if [[ "${isaac_manipulation}" == "true" ]]; then
                isaac_dev=true
              fi
            fi
          fi

          {
            echo "ros_base=${ros_base}"
            echo "ros_dev=${ros_dev}"
            echo "isaac_base=${isaac_base}"
            echo "isaac_perception=${isaac_perception}"
            echo "isaac_manipulation=${isaac_manipulation}"
            echo "isaac_dev=${isaac_dev}"
          } >> "${GITHUB_OUTPUT}"

  ros_base:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ros_base == 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.ros_base == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.ros_base == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.ros_base == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.ros_base == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ros-base
            type=raw,value=ros-base-${{ env.ROS_BASE_TAG }}
            type=sha,prefix=ros-base-

      - name: Build and Push
        if: needs.changes.outputs.ros_base == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ros/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-ros-base
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-ros-base,mode=max,ignore-error=true

  ros_dev:
    runs-on: ubuntu-latest
    needs: [changes, ros_base]
    if: ${{ always() && !cancelled() && needs.changes.result == 'success' && needs.changes.outputs.ros_dev == 'true' && (needs.changes.outputs.ros_base != 'true' || needs.ros_base.result == 'success') }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.ros_dev == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.ros_dev == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.ros_dev == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.ros_dev == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ros-dev
            type=raw,value=ros-dev-${{ env.ROS_BASE_TAG }}
            type=sha,prefix=ros-dev-

      - name: Build and Push
        if: needs.changes.outputs.ros_dev == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ros/Dockerfile.dev
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.changes.outputs.ros_base == 'true' && format('{0}@{1}', env.IMAGE_NAME, needs.ros_base.outputs.digest) || format('{0}:ros-base', env.IMAGE_NAME) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-ros-dev
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-ros-dev,mode=max,ignore-error=true

  isaac_base:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.isaac_base == 'true'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.isaac_base == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.isaac_base == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.isaac_base == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.isaac_base == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-base
            type=raw,value=isaac-base-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-base-
            type=raw,value=base
            type=raw,value=base-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=base-
            type=raw,value=latest

      - name: Build and Push
        if: needs.changes.outputs.isaac_base == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-base
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-base,mode=max,ignore-error=true

  isaac_perception:
    runs-on: ubuntu-latest
    needs: [changes, isaac_base]
    if: ${{ always() && !cancelled() && needs.changes.result == 'success' && needs.changes.outputs.isaac_perception == 'true' && (needs.changes.outputs.isaac_base != 'true' || needs.isaac_base.result == 'success') }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.isaac_perception == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.isaac_perception == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.isaac_perception == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.isaac_perception == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-perception
            type=raw,value=isaac-perception-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-perception-
            type=raw,value=perception
            type=raw,value=perception-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=perception-

      - name: Build and Push
        if: needs.changes.outputs.isaac_perception == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.perception
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.changes.outputs.isaac_base == 'true' && format('{0}@{1}', env.IMAGE_NAME, needs.isaac_base.outputs.digest) || format('{0}:isaac-base', env.IMAGE_NAME) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-perception
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-perception,mode=max,ignore-error=true

  isaac_manipulation:
    runs-on: ubuntu-latest
    needs: [changes, isaac_perception]
    if: ${{ always() && !cancelled() && needs.changes.result == 'success' && needs.changes.outputs.isaac_manipulation == 'true' && (needs.changes.outputs.isaac_perception != 'true' || needs.isaac_perception.result == 'success') }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.isaac_manipulation == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.isaac_manipulation == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.isaac_manipulation == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.isaac_manipulation == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-manipulation
            type=raw,value=isaac-manipulation-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-manipulation-
            type=raw,value=manipulation
            type=raw,value=manipulation-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=manipulation-

      - name: Build and Push
        if: needs.changes.outputs.isaac_manipulation == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.manipulation
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.changes.outputs.isaac_perception == 'true' && format('{0}@{1}', env.IMAGE_NAME, needs.isaac_perception.outputs.digest) || format('{0}:isaac-perception', env.IMAGE_NAME) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-manipulation
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-manipulation,mode=max,ignore-error=true

  isaac_dev:
    runs-on: ubuntu-latest
    needs: [changes, isaac_manipulation]
    if: ${{ always() && !cancelled() && needs.changes.result == 'success' && needs.changes.outputs.isaac_dev == 'true' && (needs.changes.outputs.isaac_manipulation != 'true' || needs.isaac_manipulation.result == 'success') }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        if: needs.changes.outputs.isaac_dev == 'true'
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: needs.changes.outputs.isaac_dev == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: needs.changes.outputs.isaac_dev == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        if: needs.changes.outputs.isaac_dev == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-dev
            type=raw,value=isaac-dev-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-dev-

      - name: Build and Push
        if: needs.changes.outputs.isaac_dev == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.dev
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ needs.changes.outputs.isaac_manipulation == 'true' && format('{0}@{1}', env.IMAGE_NAME, needs.isaac_manipulation.outputs.digest) || format('{0}:isaac-manipulation', env.IMAGE_NAME) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-dev
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache-isaac-dev,mode=max,ignore-error=true
