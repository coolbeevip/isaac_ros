name: docker

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.perception
      - Dockerfile.manipulation
      - .dockerignore
      - .github/workflows/docker.yml
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/isaac_ros
  ISAAC_ROS_TAG: isaac_ros_28556f8bc78a98822bd08b2d7c6fcf9b-amd64

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=base
            type=raw,value=base-${{ env.ISAAC_ROS_TAG }}
            type=raw,value=latest

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Image Digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  perception:
    runs-on: ubuntu-latest
    needs: base
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=perception
            type=raw,value=perception-${{ env.ISAAC_ROS_TAG }}

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.perception
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}:base
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=perception
          cache-to: type=gha,mode=max,scope=perception

      - name: Image Digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  manipulation:
    runs-on: ubuntu-latest
    needs: perception
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=manipulation
            type=raw,value=manipulation-${{ env.ISAAC_ROS_TAG }}

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.manipulation
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}:perception
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=manipulation
          cache-to: type=gha,mode=max,scope=manipulation

      - name: Image Digest
        run: echo ${{ steps.docker_build.outputs.digest }}
