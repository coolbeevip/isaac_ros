name: docker

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - .dockerignore
      - .github/workflows/docker.yml
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/phys-ros
  ISAAC_ROS_TAG: isaac_ros_28556f8bc78a98822bd08b2d7c6fcf9b-amd64
  ROS_BASE_TAG: jazzy-ros-base-noble

jobs:
  ros_base:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ros-base
            type=raw,value=ros-base-${{ env.ROS_BASE_TAG }}
            type=sha,prefix=ros-base-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ros/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ros-base
          cache-to: type=gha,mode=max,scope=ros-base

      - name: Image Digest
        run: echo "${{ steps.build.outputs.digest }}"

  ros_dev:
    runs-on: ubuntu-latest
    needs: ros_base
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=ros-dev
            type=raw,value=ros-dev-${{ env.ROS_BASE_TAG }}
            type=sha,prefix=ros-dev-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ros/Dockerfile.dev
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}@${{ needs.ros_base.outputs.digest }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ros-dev
          cache-to: type=gha,mode=max,scope=ros-dev

      - name: Image Digest
        run: echo "${{ steps.build.outputs.digest }}"

  isaac_base:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-base
            type=raw,value=isaac-base-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-base-
            type=raw,value=base
            type=raw,value=base-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=base-
            type=raw,value=latest

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.base
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=isaac-base
          cache-to: type=gha,mode=max,scope=isaac-base

      - name: Image Digest
        run: echo "${{ steps.build.outputs.digest }}"

  isaac_perception:
    runs-on: ubuntu-latest
    needs: isaac_base
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-perception
            type=raw,value=isaac-perception-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-perception-
            type=raw,value=perception
            type=raw,value=perception-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=perception-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.perception
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}@${{ needs.isaac_base.outputs.digest }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=isaac-perception
          cache-to: type=gha,mode=max,scope=isaac-perception

      - name: Image Digest
        run: echo "${{ steps.build.outputs.digest }}"

  isaac_manipulation:
    runs-on: ubuntu-latest
    needs: isaac_perception
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=isaac-manipulation
            type=raw,value=isaac-manipulation-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=isaac-manipulation-
            type=raw,value=manipulation
            type=raw,value=manipulation-${{ env.ISAAC_ROS_TAG }}
            type=sha,prefix=manipulation-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/isaac-ros/Dockerfile.manipulation
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}@${{ needs.isaac_perception.outputs.digest }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=isaac-manipulation
          cache-to: type=gha,mode=max,scope=isaac-manipulation

      - name: Image Digest
        run: echo "${{ steps.build.outputs.digest }}"
